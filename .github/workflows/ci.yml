name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: buytogether
          POSTGRES_PASSWORD: password
          POSTGRES_DB: buytogether
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg://buytogether:password@localhost:5432/buytogether
        run: |
          cd backend
          alembic upgrade head

      - name: Lint with Pylint
        run: |
          cd backend
          pip install pylint
          pylint app/ --disable=all --enable=E,F || true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg://buytogether:password@localhost:5432/buytogether
        run: |
          cd backend
          pytest -q

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          fail_ci_if_error: false
          verbose: true

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Run tests
        run: |
          cd frontend
          npm run test -- --run || true

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: false
          tags: groupbuy-backend:latest

      - name: Build frontend image (if Dockerfile exists)
        run: |
          if [ -f "./frontend/Dockerfile" ]; then
            docker build --no-cache -t groupbuy-frontend:latest ./frontend
          else
            echo "Frontend Dockerfile not found, skipping build"
          fi
        shell: bash
