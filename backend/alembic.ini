# Alembic configuration file

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to datetime.datetime.now().astimezone() to select
# an alternate timezone. the string typically should be in one of these forms:
#
# {full timezone name}
# {tzdata timezone name}
#
# where the infinitesimal case of passing in UTC is represented as UTC
# (empty string + UTC = UTC). By default, gettimezone() is called to get
# the timezone.

# timezone =

# max length of characters to apply to the
# "slug" field when generating a new migration
# (effects the filename and down_revision id)
# truncate_slug_len = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# set to 'true' to skip the new File Creation Scripts Ignore during revision autogenerate
# script_file_template = file_%(rev)s.py

# logging configuration
# when set to 'false', logging is disabled in the alembic script, regardless of the
# sqlalchemy log level settings for the changes made to the database.
# logging_file_config = ./logging.ini

# Logging level when to -q is passed to alembic upgrade or downgrade
log_level = WARN

sqlalchemy.url =

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
